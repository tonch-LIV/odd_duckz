  <link rel="stylesheet" href="styles.css">

</head>

<body>

  <main>

    <header>
      <h1>Odd Duck Voting</h1>
    </header>

    <section id="product_Container"><!--images will display here, id linked to clickListener-->

      <!--Unique id's for the imgs, src will be update through js-->
      <img id="img1" src="" alt="option 1, will cycle image">
      <img id="img2" src="" alt="option 2, will cycle image">
      <img id="img3" src="" alt="option 3, will cycle image">

    </section>

    <section id="results_Container"> <!--flexbox parent container-->

      <div id="results">
        <h2>Results</h2>
      </div> <!--generates list of results-->

      <canvas id="resultsChart"></canvas> <!--linked to add chart from chart.js-->

    <button id="resetBtn">Start New Round!!</button> <!-- find way to move below list or below chart + change styling-->
